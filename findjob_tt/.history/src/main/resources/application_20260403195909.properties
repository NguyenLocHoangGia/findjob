# Cấu hình cổng chạy web và JSP (Giữ nguyên của bạn)
server.port=8080
spring.mvc.view.prefix=/WEB-INF/view/
spring.mvc.view.suffix=.jsp

# ===============================
# CẤU HÌNH DATABASE CHO DỰ ÁN THỰC TẬP
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/jobportal_intern?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# Hãy đổi lại mật khẩu này cho đúng với MySQL trên máy của bạn (ví dụ: 123456789)
spring.datasource.password=123456789
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Tự động tạo bảng từ Entity
spring.jpa.hibernate.ddl-auto=update

# --- Cấu hình giới hạn dung lượng file Upload (Ảnh Logo, CV...) ---
# Dung lượng tối đa cho 1 file (Ví dụ: 10MB)
spring.servlet.multipart.max-file-size=10MB

# Dung lượng tối đa cho toàn bộ các file trong 1 lần gửi (Ví dụ: 20MB)
spring.servlet.multipart.max-request-size=20MB

# ===============================
# GOOGLE OAUTH2 LOGIN
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG